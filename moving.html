	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		function setup() {
			createCanvas(400,400)
		}

		function draw() {
			background("#7ccbe6");
		fill(235, 204, 8)//yellow
			noStroke()
			
			ellipse(50, 80, 150, 60)
			fill("#51e8bc")//turquoise
			noStroke()
			
			fill("#8c753f")//brown
			circle(800,800,500)
			
			noStroke()
			rect(5, 5, 150,50)
		}
	</script>
</body>
