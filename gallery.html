<!DOCTYPE html>
<html>
<head>

	<style>
		.container{
			display: grid;
			grid-template-columns: repeat(4, 1fr);
		}



		.item{
			border:1px solid black;
		}

		#fav{
			grid-column: 2 / 4;
			grid-row: 1/3;
		}

		.item img{
			width:100%;
			height:100%;
			object-fit:cover;
		}

		@media (max-width: 800px) {
			.container {
				grid-template-columns: repeat(
					1, 1fr);
			}
		}
	</style>
	
</head>
<body>

</body>

<div class="container">
	<div class="item">
		<img src="stranger.jpg" alt="the album stranger's cover">
	</div>
	<div class="item">
		<img src="alrightstill.jpg" alt="lily allen album">
	</div>
	<div class="item">
		<img src="tounges.jpg" alt="talking heads album">
	</div>
	<div class="item">
		<img src="dreams.jpg" alt="fleetwood mac">
	</div>
	<div class="item">
		
	</div>
	
</html>
