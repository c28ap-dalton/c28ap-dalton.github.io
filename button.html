<!DOCTYPE html>


<html>
<head>
	<style>
		#badbutton {
			position: absolute;
			color:blue;
			font-family: cursive;
			font-size:15px;
		}
	</style>
</head>
<body>
	<button id="badbutton"> you can't click me! </button>

	<script>

		let badbutton = document.getElementById('badbutton')

		console.log(badbutton)

		badbutton.addEventListener("click",function(){
			console.log("click!!!")
		})

		badbutton.addEventListener("mouseover", function(){
			console.log("mouse is hovering")
			badbutton.style.top=Math.random() *700 + "px"
			badbutton.style.left=Math.random()*1000 + "px"
		})

		badbutton.addEventListener("mouseout", function(){
			console.log("mouse leaves")
		})
			

		




		 	


		

	</script>

</body>
</html>
